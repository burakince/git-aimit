name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: linux,   goarch: amd64, ext: ''     }
          - { goos: linux,   goarch: arm64, ext: ''     }
          - { goos: windows, goarch: amd64, ext: .exe   }
          - { goos: windows, goarch: arm64, ext: .exe   }
          - { goos: darwin,  goarch: amd64, ext: ''     }
          - { goos: darwin,  goarch: arm64, ext: ''     }

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build -trimpath -ldflags="-s -w" \
            -o dist/git-aimit-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} .

      - uses: actions/upload-artifact@v7
        with:
          name: git-aimit-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/

  release:
    name: Create GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v3
        with:
          files: dist/*

  update-homebrew:
    name: Update Homebrew formula
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update formula URL and SHA256
        run: |
          TAG="${{ github.ref_name }}"
          URL="https://github.com/burakince/git-aimit/archive/refs/tags/${TAG}.tar.gz"
          SHA=$(curl -sL "$URL" | shasum -a 256 | awk '{print $1}')

          sed -i "s|  url \".*\"|  url \"${URL}\"|" Formula/git-aimit.rb
          sed -i "s|  sha256 \".*\"|  sha256 \"${SHA}\"|" Formula/git-aimit.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/git-aimit.rb
          git diff --staged --quiet || git commit -m "chore: update Homebrew formula to ${TAG}"
          git push
