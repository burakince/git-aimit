name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: linux,   goarch: amd64, ext: ''     }
          - { goos: linux,   goarch: arm64, ext: ''     }
          - { goos: windows, goarch: amd64, ext: .exe   }
          - { goos: windows, goarch: arm64, ext: .exe   }
          - { goos: darwin,  goarch: amd64, ext: ''     }
          - { goos: darwin,  goarch: arm64, ext: ''     }

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build -trimpath \
            -ldflags="-s -w -X github.com/burakince/git-aimit/cmd.version=${{ github.ref_name }}" \
            -o dist/git-aimit-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} .

      - uses: actions/upload-artifact@v7
        with:
          name: git-aimit-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/

  release:
    name: Create GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v3
        with:
          files: dist/*

  update-manifests:
    name: Update package manifests
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute SHA256 for each pre-built binary
        id: shas
        run: |
          TAG="${{ github.ref_name }}"
          BASE="https://github.com/burakince/git-aimit/releases/download/${TAG}"
          for target in darwin-arm64 darwin-amd64 linux-arm64 linux-amd64; do
            sha=$(curl -sL "${BASE}/git-aimit-${target}" | sha256sum | awk '{print $1}')
            echo "${target}=${sha}" >> "$GITHUB_OUTPUT"
          done
          for target in windows-amd64 windows-arm64; do
            sha=$(curl -sL "${BASE}/git-aimit-${target}.exe" | sha256sum | awk '{print $1}')
            echo "${target}=${sha}" >> "$GITHUB_OUTPUT"
          done

      - name: Patch Homebrew formula
        env:
          TAG: ${{ github.ref_name }}
          SHA_DARWIN_ARM64: ${{ steps.shas.outputs.darwin-arm64 }}
          SHA_DARWIN_AMD64: ${{ steps.shas.outputs.darwin-amd64 }}
          SHA_LINUX_ARM64:  ${{ steps.shas.outputs.linux-arm64 }}
          SHA_LINUX_AMD64:  ${{ steps.shas.outputs.linux-amd64 }}
        run: |
          python3 - <<'EOF'
          import os, re

          tag     = os.environ["TAG"]
          version = tag.lstrip("v")
          base    = f"https://github.com/burakince/git-aimit/releases/download/{tag}"
          shas = {
              "darwin-arm64": os.environ["SHA_DARWIN_ARM64"],
              "darwin-amd64": os.environ["SHA_DARWIN_AMD64"],
              "linux-arm64":  os.environ["SHA_LINUX_ARM64"],
              "linux-amd64":  os.environ["SHA_LINUX_AMD64"],
          }

          with open("Formula/git-aimit.rb") as f:
              txt = f.read()

          txt = re.sub(r'version "[^"]*"', f'version "{version}"', txt)

          for target, sha in shas.items():
              txt = re.sub(
                  rf'(url ")[^"]*/git-aimit-{re.escape(target)}"',
                  f'\\1{base}/git-aimit-{target}"',
                  txt,
              )
              txt = re.sub(
                  rf'(url "[^"]*git-aimit-{re.escape(target)}"\n\s*sha256 )"[^"]*"',
                  f'\\1"{sha}"',
                  txt,
              )

          with open("Formula/git-aimit.rb", "w") as f:
              f.write(txt)
          EOF

      - name: Patch Scoop manifest
        env:
          TAG: ${{ github.ref_name }}
          SHA_WINDOWS_AMD64: ${{ steps.shas.outputs.windows-amd64 }}
          SHA_WINDOWS_ARM64: ${{ steps.shas.outputs.windows-arm64 }}
        run: |
          python3 - <<'EOF'
          import os, json

          tag     = os.environ["TAG"]
          version = tag.lstrip("v")
          base    = f"https://github.com/burakince/git-aimit/releases/download/{tag}"

          with open("bucket/git-aimit.json") as f:
              manifest = json.load(f)

          manifest["version"] = version
          manifest["architecture"]["64bit"]["url"]  = f"{base}/git-aimit-windows-amd64.exe"
          manifest["architecture"]["64bit"]["hash"] = os.environ["SHA_WINDOWS_AMD64"]
          manifest["architecture"]["arm64"]["url"]  = f"{base}/git-aimit-windows-arm64.exe"
          manifest["architecture"]["arm64"]["hash"] = os.environ["SHA_WINDOWS_ARM64"]

          with open("bucket/git-aimit.json", "w") as f:
              json.dump(manifest, f, indent=4)
              f.write("\n")
          EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/git-aimit.rb bucket/git-aimit.json
          git diff --staged --quiet || git commit -m "chore: update package manifests to ${{ github.ref_name }}"
          git push
