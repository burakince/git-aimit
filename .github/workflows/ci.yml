name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'Formula/**'
      - 'bucket/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'Formula/**'
      - 'bucket/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - run: go vet ./...

      - run: go test ./...
